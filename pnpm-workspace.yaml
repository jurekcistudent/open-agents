packages:
  - "apps/*"
  - "packages/*"

catalog:
  ai: ^6.0.165
  "@ai-sdk/anthropic": ^3.0.70
  "@ai-sdk/openai": ^3.0.53
  "@ai-sdk/react": ^3.0.167
  zod: ^4.3.6

overrides:
  kysely: 0.28.17
  zod: ^4.3.6

minimumReleaseAge: 1440
minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeStrict: true

allowBuilds:
  "@google/genai": false
  "@nestjs/core": false
  "@swc/core": true
  cbor-extract: true
  esbuild: true
  koffi: false
  protobufjs: false
  sharp: true

minimumReleaseAgeExclude:
